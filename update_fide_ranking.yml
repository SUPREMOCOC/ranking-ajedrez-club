name: Actualizar ranking FIDE del club

on:
  schedule:
    # Día 3 de cada mes a las 06:00 UTC. La FIDE publica su listado el
    # día 1, se deja un margen de 2 días por si se retrasa.
    - cron: "0 6 3 * *"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar actualización del ranking
        run: python fide_ranking_update.py --csv jugadores_club.csv

      - name: Añadir resumen a la ejecución
        if: always()
        run: |
          if [ -f update_summary.md ]; then
            cat update_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jugadores_club.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en el ranking este mes."
          else
            git commit -m "Actualización automática ranking FIDE $(date +'%Y-%m')"
            git push
          fi
