name: Actualizar ranking FIDE del club

on:
  schedule:
    # Día 10 de cada mes a las 06:00 UTC. La FIDE publica el listado el
    # día 1, pero esos primeros días recibe mucho tráfico y a veces da
    # timeouts — esperamos más margen para evitar la hora punta.
    - cron: '0 6 10 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Diagnóstico de conectividad con la FIDE
        continue-on-error: true
        run: |
          echo "--- curl -I (solo cabeceras) ---"
          curl -I --max-time 30 -A "Mozilla/5.0" https://ratings.fide.com/download/players_list_xml.zip || true
          echo "--- ping (puede estar bloqueado igualmente, es informativo) ---"
          curl -sS --max-time 15 -o /dev/null -w "HTTP %{http_code}, tiempo total %{time_total}s\n" https://ratings.fide.com/ || true

      - name: Ejecutar actualización del ranking
        run: python fide_ranking_update.py --csv jugadores_club.csv

      - name: Añadir resumen a la ejecución
        if: always()
        run: |
          if [ -f update_summary.md ]; then
            cat update_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jugadores_club.csv
          if git diff --cached --quiet; then
            echo "Sin cambios en el ranking este mes."
          else
            git commit -m "Actualización automática ranking FIDE $(date +'%Y-%m')"
            git push
          fi
